services:
  key0:
    build: ..
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      KEY0_WALLET_ADDRESS: ${KEY0_WALLET_ADDRESS}
      KEY0_WALLET_PRIVATE_KEY: ${KEY0_WALLET_KEY}
      GAS_WALLET_PRIVATE_KEY: ${GAS_WALLET_PRIVATE_KEY}
      ISSUE_TOKEN_API: http://host.docker.internal:3001/internal/issue-token
      KEY0_NETWORK: testnet
      # Redis still required for BullMQ refund cron queue
      REDIS_URL: redis://redis:6379
      # Postgres storage backend
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/key0
      ALCHEMY_BASE_SEPOLIA_RPC_URL: ${ALCHEMY_BASE_SEPOLIA_RPC_URL:-}
      REFUND_INTERVAL_MS: 5000
      REFUND_MIN_AGE_MS: 3000
      CHALLENGE_TTL_SECONDS: 300
      AGENT_URL: http://localhost:3000
      BASE_PATH: /a2a
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: key0
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d key0"]
      interval: 5s
      timeout: 5s
      retries: 10
