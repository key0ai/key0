name: "\U0001F680 Feature Request"
description: Propose a new feature or enhancement for the Key0 SDK
title: "feat: "
labels: ["enhancement", "needs triage"]
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose an improvement to Key0!

        Before submitting:
        - **Search [existing issues and discussions](https://github.com/Riklr/key0/discussions)** to avoid duplicates.
        - **Small changes** (new config option, additional helper, minor API tweak): feel free to open a PR directly.
        - **Large or breaking changes** (new payment adapter, new protocol support, changes to the challenge/token flow): please open this issue or a Discussion first to align on the approach before writing code.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and discussions — this has not been proposed before.
          required: true
        - label: I have read the [Contributing Guidelines](https://github.com/Riklr/key0/blob/master/CONTRIBUTING.md).
          required: true
        - label: I agree to the [Code of Conduct](https://github.com/Riklr/key0/blob/master/CODE_OF_CONDUCT.md).
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: |
        What problem does this feature solve? Describe the use case clearly.
        Focus on the **why**, not just the **what**.
      placeholder: |
        As an API provider, I want to support tiered pricing based on the requested resource path,
        but today Key0 only supports a single flat price per endpoint. This forces me to run
        separate Key0 instances for each pricing tier, which is cumbersome.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to see implemented. Include an example of the ideal API if possible.
      render: typescript
      placeholder: |
        // Allow pricing to be a function that receives the request context:
        createKey0({
          pricing: (req) => {
            if (req.path.startsWith('/premium')) return { amount: '1.00', currency: 'USDC' };
            return { amount: '0.10', currency: 'USDC' };
          },
        })
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered or tried? Why is your proposed solution better?
      placeholder: |
        I considered running two separate Express routers with separate Key0 instances,
        but this duplicates the challenge storage and complicates token validation across tiers.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      description: Select the part of Key0 most relevant to this feature.
      multiple: true
      options:
        - Core (challenge engine, token issuer, storage)
        - Payment adapter (x402, on-chain verification)
        - Express integration
        - Hono integration
        - Fastify integration
        - A2A / agent card
        - Validator (token validation middleware)
        - Examples / documentation
        - Developer experience / tooling
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, related issues, links to prior art in other SDKs, or anything else that helps make the case.

  - type: checkboxes
    id: contributing
    attributes:
      label: Willing to contribute an implementation?
      options:
        - label: I would be willing to submit a pull request implementing this feature.
