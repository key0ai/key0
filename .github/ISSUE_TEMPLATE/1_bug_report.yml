name: "\U0001F41B Bug Report"
description: Report a bug or regression in the Key0 SDK
title: "bug: "
labels: ["bug", "needs triage"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible.

        Before submitting:
        - **Search [existing issues](https://github.com/Riklr/key0/issues)** to avoid duplicates. If one exists, upvote it instead.
        - Bugs without a minimal reproduction will be closed. Always test on **testnet (Base Sepolia)** first.
        - For questions and general help, use [GitHub Discussions](https://github.com/Riklr/key0/discussions) or Discord.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the [Contributing Guidelines](https://github.com/Riklr/key0/blob/master/CONTRIBUTING.md).
          required: true
        - label: I agree to the [Code of Conduct](https://github.com/Riklr/key0/blob/master/CODE_OF_CONDUCT.md).
          required: true
        - label: I tested on **testnet (Base Sepolia)** before reporting.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is. What did you expect to happen, and what actually happened?
      placeholder: |
        Expected: the payment challenge is issued and the JWT token is returned after submitting the transaction hash.
        Actual: the server responds with 500 and "challenge not found" even though the challenge was just issued.
    validations:
      required: true

  - type: input
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Link to a **public** GitHub repository or a minimal code snippet that reproduces the issue.
        Issues without a reproduction are very likely to be closed.
      placeholder: "https://github.com/your-user/key0-repro"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to trigger the bug.
      placeholder: |
        1. Configure Key0 with Express using Redis storage
        2. Send a POST /access request with a valid transaction hash
        3. Observe the 500 response
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run the commands below and paste the output.
      render: bash
      value: |
        # Run and paste output:
        # bun --version
        # node --version
        # cat package.json | grep -E '"@key0|viem|bun"'

        Bun version:
        Node version:
        Key0 version:
        viem version:
        OS:
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework
      description: Which framework are you using Key0 with?
      options:
        - Express
        - Hono
        - Fastify
        - Standalone (no framework)
        - Other
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      description: Which network does the issue occur on?
      options:
        - Testnet (Base Sepolia)
        - Mainnet (Base)
        - Not applicable (no on-chain operation involved)
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage backend
      description: Which storage backend are you using?
      options:
        - Redis (required)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Key0 configuration (sanitized)
      description: Paste your `Key0` / `createKey0` config. Remove any private keys, secrets, or wallet addresses.
      render: typescript
      placeholder: |
        createKey0({
          config: { network: 'testnet', walletAddress: '0xREDACTED', ... },
          adapter: new X402Adapter({ network: 'testnet' }),
          store: new RedisChallengeStore({ redis }),
          seenTxStore: new RedisSeenTxStore({ redis }),
        })

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or server logs that are relevant.
      render: bash
      placeholder: |
        Error: challenge not found
            at ChallengeEngine.verify (src/core/challenge.ts:84:11)
            at ...

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — transaction hashes (testnet only), screenshots, related issues, or workarounds you have tried.

  - type: checkboxes
    id: contributing
    attributes:
      label: Willing to contribute a fix?
      options:
        - label: I would be willing to submit a pull request to fix this bug.
