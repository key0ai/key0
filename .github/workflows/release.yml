name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build Docker image from (e.g. v0.1.0)"
        required: true

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish packages
        run: bunx @changesets/cli publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.KEY0_NPM_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always() && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          username: key0ai
          password: ${{ secrets.KEY0_DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: key0ai/key0
          tags: |
            type=semver,pattern={{version}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
