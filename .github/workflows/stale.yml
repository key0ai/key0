name: Stale

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been inactive for 60 days and will be closed in 7 days if there is no further activity."
          stale-pr-message: "This PR has been inactive for 30 days and will be closed in 7 days if there is no further activity."
          close-issue-message: "Closing due to inactivity. Feel free to reopen if this is still relevant."
          close-pr-message: "Closing due to inactivity. Feel free to reopen if this is still relevant."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 7
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
