name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Check changeset exists
        run: |
          count=$(find .changeset -name "*.md" ! -name "README.md" | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "❌ No changeset found. Run 'bun changeset' to add one."
            exit 1
          fi
          echo "✅ Found $count changeset file(s)."
