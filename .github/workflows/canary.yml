name: Canary

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  canary:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Version canary
        run: bunx @changesets/cli version --snapshot canary

      - name: Publish canary
        run: bunx @changesets/cli publish --tag canary --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.KEY0_NPM_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: canary
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: key0ai
          password: ${{ secrets.KEY0_DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: key0ai/key0:canary
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
