name: Canary

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  canary:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Version canary
        run: npx changeset version --snapshot canary

      - name: Publish canary
        run: npx changeset publish --tag canary --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
